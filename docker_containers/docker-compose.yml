services: 
  postgres:
    image: postgres:16
    env_file:
    - ${ENV_FILE_PATH:-.docker.env}
    environment:
      POSTGRES_DB: airflow
    ports:
      - 5432:5432
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow: 
    build: 
      context: .
      dockerfile: Dockerfile.airflow
    image: airflow-custom:3.1.3
    user: "50000:0"
    volumes: 
      - ${AIRFLOW_PROJ_DIR:-.}/.docker.env:/opt/airflow/.env
      - ${AIRFLOW_PROJ_DIR:-..}/airflow_app/dags:/opt/airflow/dags:z
      - ${AIRFLOW_PROJ_DIR:-..}/airflow_app/config:/opt/airflow/config:z
      - ${AIRFLOW_PROJ_DIR:-..}/airflow_app/plugins:/opt/airflow/plugins:z
      - ${AIRFLOW_PROJ_DIR:-..}/common:/opt/airflow/common:z

    stdin_open: true
    tty: true
    shm_size: 2gb
    env_file:
    - ${ENV_FILE_PATH:-.docker.env}
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
      _AIRFLOW_DB_MIGRATE: 'true'
      PYTHONPATH: /opt/airflow  

    command: airflow standalone
    depends_on:
      postgres: 
        condition: service_healthy
    ports:
      - 8080:8080

  minio: 
    image: quay.io/minio/aistor/minio:latest
    container_name: minio
    env_file:
    - ${ENV_FILE_PATH:-./.minio.env}
    
    ports: 
      - "9000:9000"
      - "9001:9001"
    command: server /mnt/data --console-address ":9001" --license /minio.license
    volumes:
      - ../.minio_data/minio.license:/minio.license
      - minio-data:/mnt/data
      - minio-certs:/etc/minio/certs
      
    restart: unless-stopped

volumes:
  postgres-db-volume:
    driver: local 
    driver_opts:
      type: none
      o: bind
      device: ../.postgres_data
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../.minio_data/data
  minio-certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../.minio_data/certs
